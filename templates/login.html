<!doctype html>
<html lang="fr" class="{{ 'light' if ui_prefs.get('theme') == 'light' else '' }}">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniVid — Connexion</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="loginpage">
  <main class="login">
    <img src="/static/logo.svg" alt="" height="56" />
    <h1>MiniVid</h1>
    {% if enabled %}
    <form method="post">
      <label>Utilisateur</label>
      <input type="text" name="username" required autofocus />
      <label>Mot de passe</label>
      <input type="password" name="password" required />
      <label class="remember"><input type="checkbox" name="remember" value="1" /> Se souvenir de moi</label>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Connexion</button>
    </form>
    {% else %}
    <p>Authentification désactivée. Définissez <code>MINI_USER</code>, <code>MINI_PASS</code> et <code>SECRET_KEY</code> pour l'activer.</p>
    <p><a class="btn" href="/browse">Entrer</a></p>
    {% endif %}
  </main>
</body>

</html>
