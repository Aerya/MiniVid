<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MiniVid — Maintenance</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css" />

  <style>
    /*THEME_TOGGLE*/
    html.light {
      filter: invert(1) hue-rotate(180deg)
    }

    html.light img,
    html.light video,
    html.light canvas,
    html.light iframe,
    html.light picture {
      filter: invert(1) hue-rotate(180deg)
    }

    #themeToggle {
      background: transparent;
      border: 1px solid currentColor;
      border-radius: 10px;
      padding: .25rem .5rem;
      margin-left: .5rem;
      line-height: 1
    }

    .tagsline {
      gap: .45rem .6rem
    }

    .tagsline .pill small {
      margin-left: .25rem
    }
  </style>

  <style>
    .backtop {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      display: none;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: .5rem .6rem;
      background: rgba(0, 0, 0, .35);
      backdrop-filter: blur(2px);
      cursor: pointer
    }

    html.light .backtop {
      background: rgba(255, 255, 255, .65)
    }

    .backtop.show {
      display: inline-flex
    }
  </style>

  <style>
    .fsbtn {
      position: absolute;
      right: 14px;
      top: 14px;
      padding: .35rem .5rem;
      border: 1px solid currentColor;
      border-radius: .5rem;
      background: rgba(0, 0, 0, .35);
      backdrop-filter: blur(2px);
      cursor: pointer;
      z-index: 5
    }

    html.light .fsbtn {
      background: rgba(255, 255, 255, .65)
    }

    .player,
    .watch,
    .viewer {
      position: relative
    }
  </style>
  <style>
    #backTop {
      display: inline-flex !important
    }
  </style>

  <style>
    /* A11y focus ring */
    :focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
  </style>
</head>

<body class="maintenance">
  <div id="___topanchor"></div>

  <header class="topbar">
    <a class="back-btn" id="btn-back" href="{{ back }}" title="Retour à la liste">
      <span class="back-icon">←</span>
      <span class="back-text">Retour</span>
    </a>
    <div class="brand">
      <img src="/static/logo.svg" alt="logo" height="28" />
      <strong>MiniVid</strong>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="btn" title="Thème sombre/clair">🌙</button>
    </div>
  </header>

  <!-- Floating back button for mobile -->
  <a class="floating-back" href="{{ back }}" title="Retour">←</a>


  <main class="container" style="padding:16px;">
    <div class="page-header" style="margin-bottom:1rem;">
      <h2 style="margin:0;">Maintenance</h2>
    </div>

    <div class="layout maint" style="display:grid;grid-template-columns:300px 1fr;gap:1rem;">
      <!-- Colonne Actions -->
      <section class="card">
        <header class="card-header">
          <h3 class="card-title" style="margin:0;">Actions</h3>
        </header>
        <div class="card-body">
          <div class="btn-group" style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <button id="btn-full" class="btn btn-primary" onclick="startFull()">Rescan complet</button>
            <button id="btn-purge" class="btn btn-danger" onclick="purgeThumbs()">Purger miniatures</button>
          </div>

          <div id="scan-status" class="text-muted" style="margin-top:.75rem;">Prêt.</div>
          <div class="progress" style="height:10px;margin-top:.5rem;">
            <div id="scan-bar" class="progress-bar" role="progressbar" style="width:0%"></div>
          </div>
        </div>
      </section>

      <!-- Colonne Journal (live) -->
      <section class="card" style="min-height:320px;">
        <header class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
          <h3 class="card-title" style="margin:0;">Journal récent</h3>
          <small id="journal-hint" class="text-muted" style="opacity:.8;"></small>
        </header>
        <div class="card-body">
          <div id="journal" class="table-responsive">
            <div class="text-muted">Chargement…</div>
          </div>
        </div>
      </section>
    </div>

    <!-- Section Clé API Gemini -->
    <div style="margin-top:1.5rem;">
      <section class="card">
        <header class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
          <h3 class="card-title" style="margin:0;">✨ Configuration IA (Auto-Tag)</h3>
          <small id="gemini-source" class="text-muted" style="opacity:.8;"></small>
        </header>
        <div class="card-body">
          <p style="margin:0 0 .75rem 0;opacity:.85;font-size:.9rem;">
            L'IA permet l'auto-tagging de vos vidéos (3 frames extraites).
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener"
               style="color:#8ab4f8;text-decoration:underline;display:inline-block;margin-top:4px;">
              🔑 Créer une clé Google AI Studio
            </a>
          </p>

          <!-- Configuration Ollama / Moteur -->
          <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;background:rgba(0,0,0,0.15);padding:1rem;border-radius:.5rem;">
            <div style="flex:1;min-width:180px;">
              <label style="display:block;font-size:0.85rem;margin-bottom:.3rem;">Moteur IA :</label>
              <select id="ai-engine-select" style="width:100%;padding:.4rem;border-radius:.3rem;background:var(--bg2);color:inherit;border:1px solid rgba(255,255,255,0.15);">
                <option value="gemini">Google Gemini (Cloud)</option>
                <option value="ollama">Ollama (Local / Non censuré)</option>
              </select>
            </div>
            <div style="flex:1;min-width:180px;">
              <label style="display:block;font-size:0.85rem;margin-bottom:.3rem;">URL Ollama :</label>
              <input id="ollama-url-input" type="text" placeholder="http://127.0.0.1:11434"
                     style="width:100%;padding:.4rem;border-radius:.3rem;background:var(--bg2);color:inherit;border:1px solid rgba(255,255,255,0.15);" />
            </div>
            <div style="flex:1;min-width:180px;">
              <label style="display:block;font-size:0.85rem;margin-bottom:.3rem;">Modèle Ollama Vision :</label>
              <input id="ollama-model-input" type="text" placeholder="llava:latest"
                     style="width:100%;padding:.4rem;border-radius:.3rem;background:var(--bg2);color:inherit;border:1px solid rgba(255,255,255,0.15);" />
            </div>
            <div style="display:flex;align-items:flex-end;">
              <button id="ai-config-save" class="btn btn-secondary" style="padding:.4rem 1rem;">Mettre à jour</button>
            </div>
          </div>
          
          <label style="display:block;font-size:0.85rem;margin-bottom:.3rem;">Clé API Gemini (si moteur Gemini) :</label>

          <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
            <div style="position:relative;flex:1;min-width:220px;">
              <input id="gemini-key-input" type="password" placeholder="AIza…"
                     autocomplete="off" spellcheck="false"
                     style="width:100%;padding:.5rem .7rem;padding-right:2.5rem;border:1px solid rgba(255,255,255,.15);border-radius:.5rem;background:rgba(255,255,255,.06);color:inherit;font-family:monospace;font-size:.9rem;" />
              <button id="gemini-toggle-vis" type="button" title="Afficher / masquer"
                      style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:0.9rem;padding:2px 4px;color:inherit;opacity:.6;">
                Voir
              </button>
            </div>
            <button id="gemini-save" class="btn btn-primary" style="white-space:nowrap;">Enregistrer</button>
            <button id="gemini-delete" class="btn btn-danger" style="white-space:nowrap;">Supprimer</button>
          </div>

          <div id="gemini-status" class="text-muted" style="margin-top:.5rem;font-size:.85rem;"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    // --- Bouton Retour EXACT sur la page précédente ---
    (function setupBack() {
      const back = document.getElementById('btn-back');
      if (!back) return;
      back.addEventListener('click', function (e) {
        e.preventDefault();
        const ref = document.referrer || "";
        try {
          if (ref && new URL(ref).origin === window.location.origin) {
            history.back();
            setTimeout(() => { if (document.referrer) location.href = ref; else location.href = "/browse"; }, 300);
          } else {
            location.href = "/browse";
          }
        } catch (_e) {
          location.href = "/browse";
        }
      });
    })();

    // --- UI helpers ---
    const statusEl = document.getElementById('scan-status');
    const barEl = document.getElementById('scan-bar');
    const hintEl = document.getElementById('journal-hint');

    let pollProgTimer = null;
    let pollLogTimer = null;
    let lastRendered = "";

    function setStatus(txt) { if (statusEl) statusEl.textContent = txt; }
    function setProgress(p) {
      if (!barEl) return;
      const v = Math.max(0, Math.min(100, parseInt(p || 0)));
      barEl.style.width = v + "%";
      barEl.setAttribute("aria-valuenow", v);
    }
    function setHint(txt) { if (hintEl) hintEl.textContent = txt || ""; }

    // --- Actions ---
    async function startFull() {
      const b2 = document.getElementById('btn-full');
      if (b2) b2.disabled = true;
      setStatus("Démarrage du scan…");
      setProgress(0);
      setHint("Journal en direct…");
      try {
        const r = await fetch("/api/maintenance/rescan", { method: "POST", credentials: "same-origin" });
        if (r.ok || r.status === 202 || r.status === 409) {
          startLiveJournal();
          pollProgress();
        } else {
          const j = await r.json().catch(() => ({}));
          setStatus("Erreur: " + (j.error || r.status));
          setHint("");
          if (b2) b2.disabled = false;
        }
      } catch (e) {
        setStatus("Erreur réseau: " + e);
        setHint("");
        if (b2) b2.disabled = false;
      }
    }

    async function purgeThumbs() {
      const btn = document.getElementById('btn-purge');
      if (btn) btn.disabled = true;
      setHint("Mise à jour du journal…");
      try {
        const r = await fetch("/api/maintenance/purge_thumbs", { method: "POST", credentials: "same-origin" });
        const j = await r.json().catch(() => ({}));
        if (r.ok && j.ok) {
          alert(`Supprimé: ${j.removed || 0} miniatures`);
          loadJournal();
        } else {
          alert(`Erreur purge (${r.status}) : ${j.error || 'inconnue'}`);
        }
      } catch (e) {
        alert("Erreur réseau purge: " + e);
      } finally {
        setHint("");
        if (btn) btn.disabled = false;
      }
    }

    // --- Progress / Live logs ---
    async function pollProgress() {
      clearTimeout(pollProgTimer);
      try {
        const r = await fetch("/api/maintenance/progress", { credentials: "same-origin" });
        const j = await r.json();
        if (j && j.ok) {
          const running = !!j.running;
          setProgress(j.progress || 0);
          setStatus((running ? "Scan en cours — " : "Statut : ") + (j.message || ""));
          const b2 = document.getElementById('btn-full');
          if (b2) b2.disabled = running;
          pollProgTimer = setTimeout(pollProgress, running ? 1000 : 5000);
          if (!running) {
            stopLiveJournal();
            setHint("");
            loadJournal();
          }
        } else {
          pollProgTimer = setTimeout(pollProgress, 4000);
        }
      } catch (e) {
        pollProgTimer = setTimeout(pollProgress, 5000);
      }
    }

    async function loadJournal() {
      const box = document.getElementById('journal');
      if (!box) return;
      try {
        const r = await fetch("/api/maintenance/journal", { credentials: "same-origin" });
        const j = await r.json();
        if (!j || !j.ok) { box.innerHTML = '<div class="text-muted">—</div>'; return; }
        const ev = j.events || [];
        if (!ev.length) { box.innerHTML = '<div class="text-muted">Aucun évènement</div>'; return; }

        const rows = ev.slice().reverse().map(e => {
          const dt = new Date((e.ts || 0) * 1000).toLocaleString(undefined, {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
          });
          const kind = e.event || "";
          const items = (e.items != null ? e.items : "—");
          const changedRemoved = (e.changed != null ? e.changed : (e.removed != null ? e.removed : "—"));
          const took = (e.took_ms != null ? (e.took_ms + "ms") : "—");
          return `<tr>
            <td>${dt}</td>
            <td>${kind}</td>
            <td>${items}</td>
            <td>${changedRemoved}</td>
            <td>${took}</td>
          </tr>`;
        }).join("");

        const html = `
          <div class="table-wrapper" style="overflow:auto;">
            <table class="table" style="width:100%; min-width:680px;">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Action</th>
                  <th>Fichier(s)</th>
                  <th>Modifié(s)</th>
                  <th>Durée</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
        if (html !== lastRendered) {
          lastRendered = html;
          box.innerHTML = html;
        }
      } catch {
        const box = document.getElementById('journal');
        if (box) box.innerHTML = '<div class="text-muted">—</div>';
      }
    }

    function startLiveJournal() {
      stopLiveJournal();
      pollLogTimer = setInterval(loadJournal, 1200);
      loadJournal();
    }
    function stopLiveJournal() {
      if (pollLogTimer) {
        clearInterval(pollLogTimer);
        pollLogTimer = null;
      }
    }

    // --- Gemini API key management ---
    const geminiInput = document.getElementById('gemini-key-input');
    const geminiStatus = document.getElementById('gemini-status');
    const geminiSource = document.getElementById('gemini-source');
    const geminiToggle = document.getElementById('gemini-toggle-vis');

    function setGeminiStatus(txt, isError) {
      if (geminiStatus) {
        geminiStatus.textContent = txt;
        geminiStatus.style.color = isError ? '#f87171' : '';
      }
    }

    async function loadGeminiKey() {
      try {
        const r = await fetch('/api/settings/gemini_key', { credentials: 'same-origin' });
        const j = await r.json();
        if (j && j.ok) {
          if (geminiInput) geminiInput.placeholder = j.has_key ? j.masked_key : 'AIza…';
          const labels = { ui: '✅ Clé UI', env: '🔧 Clé env', none: '⚠️ Non configurée' };
          if (geminiSource) geminiSource.textContent = labels[j.source] || '';
          if (!j.has_key) setGeminiStatus('Aucune clé configurée. Saisissez-en une pour activer l\'auto-tag IA.', false);
          else setGeminiStatus('Clé active — l\'auto-tag IA est disponible.', false);
        }
      } catch (e) {
        setGeminiStatus('Erreur de chargement', true);
      }
    }

    document.getElementById('gemini-save')?.addEventListener('click', async () => {
      const key = (geminiInput?.value || '').trim();
      if (!key) { setGeminiStatus('Veuillez saisir une clé.', true); return; }
      setGeminiStatus('Enregistrement…', false);
      try {
        const r = await fetch('/api/settings/gemini_key', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        const j = await r.json();
        if (j.ok) {
          geminiInput.value = '';
          setGeminiStatus('✅ Clé enregistrée avec succès !', false);
          loadGeminiKey();
        } else {
          setGeminiStatus('Erreur : ' + (j.error || 'inconnue'), true);
        }
      } catch (e) {
        setGeminiStatus('Erreur réseau : ' + e, true);
      }
    });

    document.getElementById('gemini-delete')?.addEventListener('click', async () => {
      if (!confirm('Supprimer la clé API Gemini enregistrée dans l\'interface ?')) return;
      setGeminiStatus('Suppression…', false);
      try {
        const r = await fetch('/api/settings/gemini_key', {
          method: 'DELETE', credentials: 'same-origin'
        });
        const j = await r.json();
        if (j.ok) {
          geminiInput.value = '';
          setGeminiStatus('Clé supprimée.' + (j.has_key ? ' (fallback clé env active)' : ''), false);
          loadGeminiKey();
        } else {
          setGeminiStatus('Erreur : ' + (j.error || 'inconnue'), true);
        }
      } catch (e) {
        setGeminiStatus('Erreur réseau : ' + e, true);
      }
    });

    // --- AI Config Management (Engine, Ollama) ---
    async function loadAIConfig() {
      try {
        const r = await fetch('/api/settings/ai_config', { credentials: 'same-origin' });
        const j = await r.json();
        if (j && j.ok) {
          const engSel = document.getElementById('ai-engine-select');
          if (engSel) engSel.value = j.engine || 'gemini';
          const urlInp = document.getElementById('ollama-url-input');
          if (urlInp) urlInp.value = j.ollama_url || '';
          const modInp = document.getElementById('ollama-model-input');
          if (modInp) modInp.value = j.ollama_model || '';
        }
      } catch (e) {
        setGeminiStatus('Erreur de chargement de la configuration IA', true);
      }
    }

    document.getElementById('ai-config-save')?.addEventListener('click', async () => {
      setGeminiStatus('Enregistrement configuration...', false);
      const engine = document.getElementById('ai-engine-select')?.value || 'gemini';
      const ollama_url = document.getElementById('ollama-url-input')?.value.trim();
      const ollama_model = document.getElementById('ollama-model-input')?.value.trim();
      
      try {
        const r = await fetch('/api/settings/ai_config', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ engine, ollama_url, ollama_model })
        });
        const j = await r.json();
        if (j.ok) {
          setGeminiStatus('✅ Configuration IA enregistrée !', false);
        } else {
          setGeminiStatus('Erreur config IA : ' + (j.error || 'inconnue'), true);
        }
      } catch (e) {
        setGeminiStatus('Erreur réseau config IA : ' + e, true);
      }
    });

    geminiToggle?.addEventListener('click', () => {
      if (!geminiInput) return;
      const show = geminiInput.type === 'password';
      geminiInput.type = show ? 'text' : 'password';
      geminiToggle.textContent = show ? 'Cacher' : 'Voir';
    });

    // init
    (function () {
      pollProgress();
      loadJournal();
      loadGeminiKey();
      loadAIConfig();
    })();
  </script>

  <script>
    /* Theme toggle */
    (function () {
      const key = 'minivid_theme';
      try {
        const saved = localStorage.getItem(key) || 'dark';
        if (saved === 'light') document.documentElement.classList.add('light');
        document.addEventListener('click', function (e) {
          const b = e.target.closest('#themeToggle');
          if (!b) return;
          const el = document.documentElement;
          el.classList.toggle('light');
          localStorage.setItem(key, el.classList.contains('light') ? 'light' : 'dark');
        });
      } catch (e) { }
    })();
  </script>
</body>

</html>
