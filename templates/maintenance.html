<!doctype html>
<html lang="fr" class="{{ 'light' if ui_prefs.get('theme') == 'light' else '' }}">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MiniVid — Maintenance</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="maintenance">
  <header class="topbar">
    <a class="back-btn" id="btn-back" href="/browse" title="Retour à la liste">
      <span class="back-icon">←</span>
      <span class="back-text">Retour</span>
    </a>
    <a class="brand" href="/browse" aria-label="Accueil MiniVid">
      <img src="/static/logo.svg" alt="" height="30" />
      <strong>MiniVid</strong>
    </a>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn" title="Thème clair/sombre" aria-label="Thème clair/sombre">☾</button>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <div>
        <h2 style="margin:0;">Maintenance</h2>
        <p class="meta" style="margin:.15rem 0 0;">Indexation, cache et options partagées.</p>
      </div>
    </div>

    <div class="layout maint">
      <section class="card">
        <header class="card-header">
          <h3 class="card-title">Actions</h3>
        </header>
        <div class="card-body">
          <div class="btn-group">
            <button id="btn-full" class="btn btn-primary" onclick="startFull()">Rescan complet</button>
            <button id="btn-purge" class="btn btn-danger" onclick="purgeThumbs()">Purger miniatures</button>
          </div>
          <div id="scan-status" class="text-muted" style="margin-top:.75rem;">Prêt.</div>
          <div class="progress">
            <div id="scan-bar" class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" style="width:0%"></div>
          </div>
        </div>
      </section>

      <section class="card" style="min-height:320px;">
        <header class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
          <h3 class="card-title">Journal récent</h3>
          <small id="journal-hint" class="text-muted"></small>
        </header>
        <div class="card-body">
          <div id="journal" class="table-responsive">
            <div class="text-muted">Chargement...</div>
          </div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:1rem;">
      <header class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
        <h3 class="card-title">Vidéos similaires</h3>
        <small id="similar-status-label" class="text-muted"></small>
      </header>
      <div class="card-body">
        <p class="meta" style="margin:0 0 .75rem;">Affiche sous chaque vidéo une grille de contenus ayant des tags en commun. Ce réglage est stocké côté serveur.</p>
        <div class="settings-row">
          <label class="smart-toggle">
            <input type="checkbox" id="similar-enabled" />
            <span>Activer</span>
          </label>
          <label class="smart-toggle"><input type="radio" name="similar-min" value="1" /> 1 tag</label>
          <label class="smart-toggle"><input type="radio" name="similar-min" value="2" checked /> 2 tags</label>
          <label class="smart-toggle"><input type="radio" name="similar-min" value="3" /> 3 tags</label>
          <button id="similar-save" class="btn btn-primary">Enregistrer</button>
        </div>
        <div id="similar-msg" class="text-muted" style="margin-top:.6rem;"></div>
      </div>
    </section>
  </main>

  <script>
    async function savePrefs(patch) {
      try {
        await fetch('/api/preferences', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch)
        });
      } catch (_) {}
    }

    (function setupBack() {
      const back = document.getElementById('btn-back');
      back?.addEventListener('click', function (e) {
        const ref = document.referrer || "";
        try {
          if (ref && new URL(ref).origin === window.location.origin) {
            e.preventDefault();
            history.back();
          }
        } catch (_) {}
      });
    })();

    (function themeToggle() {
      const btn = document.getElementById('themeToggle');
      function sync() { if (btn) btn.textContent = document.documentElement.classList.contains('light') ? '☀' : '☾'; }
      sync();
      btn?.addEventListener('click', () => {
        const isLight = document.documentElement.classList.toggle('light');
        savePrefs({ theme: isLight ? 'light' : 'dark' });
        sync();
      });
    })();

    const statusEl = document.getElementById('scan-status');
    const barEl = document.getElementById('scan-bar');
    const hintEl = document.getElementById('journal-hint');
    let pollProgTimer = null;
    let pollLogTimer = null;
    let lastRendered = "";

    function setStatus(txt) { if (statusEl) statusEl.textContent = txt; }
    function setProgress(p) {
      if (!barEl) return;
      const v = Math.max(0, Math.min(100, parseInt(p || 0)));
      barEl.style.width = v + "%";
      barEl.setAttribute("aria-valuenow", v);
    }
    function setHint(txt) { if (hintEl) hintEl.textContent = txt || ""; }

    async function startFull() {
      const btn = document.getElementById('btn-full');
      if (btn) btn.disabled = true;
      setStatus("Démarrage du scan...");
      setProgress(0);
      setHint("Journal en direct...");
      try {
        const r = await fetch("/api/maintenance/rescan", { method: "POST", credentials: "same-origin" });
        if (r.ok || r.status === 202 || r.status === 409) {
          startLiveJournal();
          pollProgress();
        } else {
          const j = await r.json().catch(() => ({}));
          setStatus("Erreur : " + (j.error || r.status));
          setHint("");
          if (btn) btn.disabled = false;
        }
      } catch (e) {
        setStatus("Erreur réseau : " + e);
        setHint("");
        if (btn) btn.disabled = false;
      }
    }

    async function purgeThumbs() {
      const btn = document.getElementById('btn-purge');
      if (btn) btn.disabled = true;
      setHint("Mise à jour du journal...");
      try {
        const r = await fetch("/api/maintenance/purge_thumbs", { method: "POST", credentials: "same-origin" });
        const j = await r.json().catch(() => ({}));
        if (r.ok && j.ok) {
          alert(`Miniatures supprimées : ${j.removed || 0}`);
          loadJournal();
        } else {
          alert(`Erreur purge (${r.status}) : ${j.error || 'inconnue'}`);
        }
      } catch (e) {
        alert("Erreur réseau purge : " + e);
      } finally {
        setHint("");
        if (btn) btn.disabled = false;
      }
    }

    async function pollProgress() {
      clearTimeout(pollProgTimer);
      try {
        const r = await fetch("/api/maintenance/progress", { credentials: "same-origin" });
        const j = await r.json();
        if (j && j.ok) {
          const running = !!j.running;
          setProgress(j.progress || 0);
          setStatus((running ? "Scan en cours — " : "Statut : ") + (j.message || ""));
          const btn = document.getElementById('btn-full');
          if (btn) btn.disabled = running;
          pollProgTimer = setTimeout(pollProgress, running ? 1000 : 5000);
          if (!running) {
            stopLiveJournal();
            setHint("");
            loadJournal();
          }
        } else {
          pollProgTimer = setTimeout(pollProgress, 4000);
        }
      } catch (_) {
        pollProgTimer = setTimeout(pollProgress, 5000);
      }
    }

    async function loadJournal() {
      const box = document.getElementById('journal');
      if (!box) return;
      try {
        const r = await fetch("/api/maintenance/journal", { credentials: "same-origin" });
        const j = await r.json();
        if (!j || !j.ok) { box.innerHTML = '<div class="text-muted">Aucun journal</div>'; return; }
        const ev = j.events || [];
        if (!ev.length) { box.innerHTML = '<div class="text-muted">Aucun événement</div>'; return; }
        const rows = ev.slice().reverse().map(e => {
          const dt = new Date((e.ts || 0) * 1000).toLocaleString(undefined, {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
          });
          return `<tr>
            <td>${dt}</td>
            <td>${e.event || ""}</td>
            <td>${e.items != null ? e.items : "—"}</td>
            <td>${e.changed != null ? e.changed : (e.removed != null ? e.removed : "—")}</td>
            <td>${e.took_ms != null ? e.took_ms + "ms" : "—"}</td>
          </tr>`;
        }).join("");
        const html = `<div class="table-wrapper"><table class="table">
          <thead><tr><th>Date</th><th>Action</th><th>Fichiers</th><th>Modifiés</th><th>Durée</th></tr></thead>
          <tbody>${rows}</tbody></table></div>`;
        if (html !== lastRendered) {
          lastRendered = html;
          box.innerHTML = html;
        }
      } catch (_) {
        box.innerHTML = '<div class="text-muted">Aucun journal</div>';
      }
    }

    function startLiveJournal() {
      stopLiveJournal();
      pollLogTimer = setInterval(loadJournal, 1200);
      loadJournal();
    }
    function stopLiveJournal() {
      if (pollLogTimer) clearInterval(pollLogTimer);
      pollLogTimer = null;
    }

    async function loadSimilarConfig() {
      try {
        const r = await fetch('/api/settings/similar', { credentials: 'same-origin' });
        const j = await r.json();
        if (!j?.ok) return;
        const cb = document.getElementById('similar-enabled');
        if (cb) cb.checked = !!j.enabled;
        document.querySelectorAll('input[name="similar-min"]').forEach(radio => {
          radio.checked = radio.value == String(j.min_tags);
        });
        const lbl = document.getElementById('similar-status-label');
        if (lbl) lbl.textContent = j.enabled ? 'Activé' : 'Désactivé';
      } catch (_) {}
    }

    document.getElementById('similar-save')?.addEventListener('click', async () => {
      const enabled = document.getElementById('similar-enabled')?.checked || false;
      const minEl = document.querySelector('input[name="similar-min"]:checked');
      const min_tags = minEl ? parseInt(minEl.value) : 2;
      const msg = document.getElementById('similar-msg');
      try {
        const r = await fetch('/api/settings/similar', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled, min_tags })
        });
        const j = await r.json();
        if (j.ok) {
          if (msg) msg.textContent = 'Configuration enregistrée.';
          const lbl = document.getElementById('similar-status-label');
          if (lbl) lbl.textContent = enabled ? 'Activé' : 'Désactivé';
        } else if (msg) {
          msg.textContent = 'Erreur : ' + (j.error || 'inconnue');
        }
      } catch (e) {
        if (msg) msg.textContent = 'Erreur réseau : ' + e;
      }
    });

    pollProgress();
    loadJournal();
    loadSimilarConfig();
  </script>
</body>

</html>
